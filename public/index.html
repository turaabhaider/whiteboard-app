<!DOCTYPE html>
<html>
<head>
    <title>Realtime Whiteboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Realtime Whiteboard</h2>

<!-- Toolbar -->
<div class="toolbar">
    <button onclick="setTool('brush')">Brush</button>
    <button onclick="setTool('square')">Square</button>
    <button onclick="setTool('circle')">Circle</button>
    <button onclick="setTool('star')">Star</button>

    Color: <input type="color" id="colorPicker" value="#000000">
    Brush Size: <input type="range" id="brushSize" min="1" max="20" value="4">
    <button id="clearBtn">Clear Board</button>
</div>

<!-- Canvas -->
<canvas id="board"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
